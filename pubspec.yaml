name: smart_gpa_calculator
description: Smart GPA Calculator with PIN

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.18.1
  flutter_native_splash: ^2.3.8
  flutter_launcher_icons: ^0.13.1  # 🔴 HII NI LAZIMA

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# 🔴 HII NDIO SEHEMU MUHIMU ZAIDI!
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"  # PNG yako ya kwanza
  adaptive_icon_background: "#6200EE"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#6200EE"
  image: assets/splash_logo.png  # PNG yako ya pili
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png       # PNG yako ya kwanza
    - assets/logo.png       # PNG yako ya pili
    - assets/splash_logo.png # PNG yako ya tatu
